name: OSS Metrics

on:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run OSS health script
        run: |
          mkdir -p metrics
          python ../scripts/oss_health.py --repo AshishRudrawar/gh-branch-guard > metrics/latest.md
      - name: Commit metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics/latest.md
          git commit -m "ci: update weekly OSS metrics" || echo "no changes"
          git push
